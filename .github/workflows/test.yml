name: Просто Windows

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build
        run: |
          mkdir output
          echo "Файл готов" > output/test.txt
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: test
          path: output/
